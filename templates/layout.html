<!DOCTYPE html>
<html>
<head>
    <title>AI Hiring System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #1e293b;
            color: white;
            padding: 20px;
            position: fixed;
        }

        .sidebar h2 {
            margin-bottom: 30px;
            font-size: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .sidebar a:hover {
            background: #334155;
            color: white;
        }

        /* Main Content */
        .main {
            margin-left: 240px;
            width: 100%;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #1e293b;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f1f5f9;
        }

        .top3 {
            background: #dcfce7 !important;
            font-weight: bold;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .grade-Aplus { background: #16a34a; color: white; }
        .grade-A { background: #2563eb; color: white; }
        .grade-B { background: #f59e0b; color: white; }
        .grade-C { background: #fb923c; color: white; }
        .grade-D { background: #ef4444; color: white; }
        .grade-Reject { background: #b91c1c; color: white; }

        textarea, input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        .top-card {
            background: #22c55e;
            color: white;
        }

    </style>
</head>

<body>

<div class="sidebar">
    <h2>AI Hiring</h2>
    <a href="/jobs">Jobs</a>
    <a href="/create-job">Create Job</a>
    <a href="/logout">Logout</a>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

</body>
</html>
