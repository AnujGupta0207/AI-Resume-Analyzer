<!DOCTYPE html>
<html>

<head>
<title>AI Resume Analyzer Login</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(135deg,#2563eb,#4f46e5);
}

/* login card */

.login-card{

    width:380px;
    background:white;

    padding:40px;
    border-radius:10px;

    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* title */

.login-title{
    text-align:center;
    margin-bottom:25px;
}

.login-title h2{
    margin:0;
}

.login-title p{
    color:#666;
    margin-top:5px;
}

/* inputs */

.login-card input{

    width:100%;
    padding:10px;

    margin-top:10px;
    margin-bottom:15px;

    border-radius:5px;
    border:1px solid #ccc;
}

/* button */

.login-card button{

    width:100%;
    padding:10px;

    border:none;
    border-radius:5px;

    background:#2563eb;
    color:white;

    font-size:16px;
    cursor:pointer;
}

.login-card button:hover{
    background:#1e40af;
}

/* error */

.error{
    background:#fee2e2;
    color:#b91c1c;

    padding:8px;
    border-radius:5px;

    margin-bottom:10px;
    text-align:center;
}

</style>

</head>

<body>

<div class="login-card">

<div class="login-title">
<h2>AI Resume Analyzer</h2>
<p>HR Login Panel</p>
</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
